<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grabix Pro — Download any video, any platform</title>
    <meta
      name="description"
      content="Grabix Pro grabs video and audio from YouTube, TikTok, Instagram, Facebook, X and more. Pick your quality, save MP4 or MP3, no watermark. Free for Windows & Android."
    />
    <meta name="theme-color" content="#0A0F16" />

    <!-- Favicons. Without these the browser tab falls back to its generic globe. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Social share cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Grabix Pro" />
    <meta
      property="og:title"
      content="Grabix Pro — Download any video, any platform"
    />
    <meta
      property="og:description"
      content="Save video and audio from YouTube, TikTok, Instagram, Facebook, X and more. Pick your quality, keep it as MP4 or MP3 — no watermark, no account. Free for Windows &amp; Android."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Grabix Pro — Download any video, any platform"
    />
    <meta
      name="twitter:description"
      content="Save video and audio from YouTube, TikTok, Instagram, Facebook, X and more. No watermark, no account. Free for Windows &amp; Android."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
